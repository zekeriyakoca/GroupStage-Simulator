apiVersion: apps/v1
kind: Deployment
metadata:
  name: stagesim-api
  labels:
    app: stagesim-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stagesim-api
  template:
    metadata:
      labels:
        app: stagesim-api
    spec:
      containers:
        - name: stagesim-api
          image: docker.io/zekeriyakoca/stagesim-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
---
apiVersion: v1
kind: Service
metadata:
  name: stagesim-api
spec:
  selector:
    app: stagesim-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stagesim-api
spec:
  entryPoints:
    - websecure
  tls:
    certResolver: letsencrypt
  routes:
    - match: Host(`lontray.art`) && PathPrefix(`/stagesim`)
      kind: Rule
      middlewares:
        - name: strip-stagesim
      services:
        - name: stagesim-api
          port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-stagesim
spec:
  stripPrefix:
    prefixes:
      - /stagesim
